<?xml version="1.0" encoding="UTF-8"?>
<!--
  Buffalo tail - a worked example, built twice.

  Open this in Sangala Studio, switch to 3D, and press 3D View. The two assemblies are
  identical geometry; the only difference is that the right-hand one is FUSED.

     LEFT   five separate pieces - the 3D View draws each in its own color
                                   (rump red, tail blue / green / gold / purple)
     RIGHT  one fused piece      - the 3D View draws the whole thing in ONE color

  That color difference IS the lesson: a fused group prints as one solid object, while
  separate pieces are five objects that merely touch, and a slicer may treat them as five.
  To fuse a set yourself: drag a box around the parts, then press "Fuse into one piece"
  in the Selected object panel. Drag inside the 3D View to rotate - a hanging part is
  always partly behind whatever it hangs from, so turning the model is how you inspect it.

  HOW THE TAIL IS MADE. A circle becomes a cylinder, and Base decides how high off the
  build plate it sits, so a stack of circles hangs one under another. Two things make it
  read as a tail rather than a peg:

    THIN AND LONG. The shaft is 4 to 6 mm across over a 42 mm drop - about eight times
    longer than it is wide. A tail modelled as short fat discs looks like a plug.

    IT CURVES. Each segment sits a little further forward than the one above (cy 24, 21,
    18, 15.5), so the tail sweeps outward as it falls instead of dropping like a plumb
    line. Nothing rotates - each cylinder is still vertical - but stepping the centres
    reads as a curve, and it is what makes the shape look alive.

  Taper comes from using a smaller circle lower down. Slope cannot do it, because Slope
  ramps the top face of a rectangle, which does nothing along a tail.

     rump block   40 x 28 mm, Depth 20, Base 45           ->  Z 45 to 65
     root          6 mm across at y 24, Depth 11, Base 34 ->  Z 34 to 45   (top meets the rump's Base)
     mid         4.8 mm across at y 21, Depth 13, Base 22 ->  Z 22 to 35
     lower         4 mm across at y 18, Depth 12, Base 11 ->  Z 11 to 23
     switch      6.8 mm across at y 15.5, Depth 9, Base 3 ->  Z  3 to 12   (the bushy tip)

  Each segment overlaps the one above it by a millimetre or two in Z AND across, so the
  chain welds when fused - two solids that merely touch are a coin toss for the slicer.
  The root overlaps the rump by 5 mm, and the rump's underside drops a hair into it when
  fused, so the joint is solid.

  WHERE THE TAIL SITS, and why it matters. The tail hangs from the rump's NEAR edge and
  sweeps toward you. Tuck it inside the block's footprint and it is hidden underneath;
  hang it off the far edge and the block stands in front of it. Either way it builds
  perfectly and you see nothing, and correct geometry you cannot see looks exactly like
  broken geometry.

  PRINTING. This tail hangs in free air, so its lowest point starts with nothing beneath
  it, and the switch is wider than the shaft above it. Expect to switch support material
  on. 4 mm is about the thinnest that survives handling in PLA, which is why the shaft
  stops there rather than going finer. If it gives trouble, the sturdier answer is to stop
  making the tail a separate part: draw the rump outline with the Pen so the tail is part
  of that same closed shape. It then prints flat, fully supported, and cannot snap off.

  Every shape is a red solid outline, which is what Sangala Studio itself writes, so this
  file behaves exactly like one you saved yourself.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="150mm" height="80mm" viewBox="0 0 150 80">

  <!-- ============================================================ LEFT: NOT fused.
       No data-group, so these are five independent pieces, each drawn in its own color. -->

  <rect   x="20" y="22" width="40" height="28"
          data-z="20" data-z0="45"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="40" cy="24" r="3"
          data-z="11" data-z0="34"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="40" cy="21" r="2.4"
          data-z="13" data-z0="22"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="40" cy="18" r="2"
          data-z="12" data-z0="11"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="40" cy="15.5" r="3.4"
          data-z="9" data-z0="3"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <!-- ============================================================ RIGHT: FUSED.
       The same five shapes, shifted 70 mm across, all carrying data-group="1" - which is
       how Sangala Studio records a fuse when it saves. Drawn in ONE color, and Export STL
       writes it as a single solid. -->

  <rect   x="90" y="22" width="40" height="28"
          data-z="20" data-z0="45" data-group="1"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="110" cy="24" r="3"
          data-z="11" data-z0="34" data-group="1"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="110" cy="21" r="2.4"
          data-z="13" data-z0="22" data-group="1"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="110" cy="18" r="2"
          data-z="12" data-z0="11" data-group="1"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

  <circle cx="110" cy="15.5" r="3.4"
          data-z="9" data-z0="3" data-group="1"
          fill="none" stroke="#ff0000" stroke-width="0.2"/>

</svg>
