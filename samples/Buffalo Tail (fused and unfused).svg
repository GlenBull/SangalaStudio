<?xml version="1.0" encoding="UTF-8"?>
<!--
  Buffalo tail - a worked example, built twice.

  Open this in Sangala Studio, switch to 3D, and press 3D View. The two tails are identical;
  the only difference is that the right-hand one is FUSED.

     LEFT   15 separate pieces - the 3D View gives each piece its own color
     RIGHT  one fused piece      - the whole assembly is drawn in a single color

  That color difference IS the lesson: a fused group prints as one solid object, while separate
  pieces are 15 objects that merely touch, and a slicer may treat them as 15. To fuse a set
  yourself, drag a box around the parts and press "Fuse into one piece" in the Selected object
  panel. Drag inside the 3D View to rotate - a hanging part is always partly behind whatever it
  hangs from, so turning the model is how you inspect it.

  HOW THE TAIL IS MADE. A circle becomes a cylinder, and Base sets how high off the build plate
  it sits, so a stack of circles hangs one beneath another. Two things make it read as a tail:

    IT CURVES, RATHER THAN LEANING. This is the part that is easy to get wrong. An earlier
    version stepped each segment sideways by almost the same amount - 3 mm, 3 mm, 2.5 mm - and a
    near-constant step is a straight diagonal. It leaned; it did not curve. What the eye
    reads as a curve is a change of DIRECTION, not a sideways displacement, so this tail is
    built from a heading instead: it leaves the rump 46 degrees off vertical and rotates steadily
    to 2 degrees by the tip - a turn of 45 degrees, which is a true arc. That is also why the
    sideways steps are biggest at the TOP (2.2 mm) and smallest at the tip: the tail is
    thickest where it moves most, so every joint stays comfortably welded.

    IT TAPERS. The dock narrows without interruption, 9.4 mm across at the rump down to 3.5 mm,
    a ratio of about 2.6 to 1. The earlier version failed here too - its tuft was FATTER than its
    root, so the tail got wider towards the end. The switch of hair at the tip flares back out
    to 5.7 mm, which is wider than the dock it hangs from, exactly as on the real animal,
    but still far narrower than the root, so the taper survives.

  Taper cannot come from Slope: Slope ramps the top face of a rectangle, which does nothing
  along a tail. It comes from simply using a smaller circle further down.

  WHERE THE TAIL SITS, and why it matters. The tail leaves the rump near a corner and swings
  clear of the block. Tuck it inside the block's footprint and it hides underneath; a tail that
  is built perfectly and cannot be seen looks exactly like a broken one.

  PRINTING. The tail hangs in free air, so expect to turn support material on. The thinnest
  part is 3.5 mm, which survives handling in PLA; going much finer will snap. If it does give
  trouble, the sturdier answer is to stop making the tail a separate part: draw the rump
  outline with the Pen so the tail is part of that same closed shape. It then prints flat,
  fully supported, and cannot break off.

  Tail: 39 mm long, 14 segments. Every shape is a red solid outline, which is what Sangala
  Studio itself writes, so this file behaves exactly like one you saved yourself.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="130mm" height="50mm" viewBox="0 0 130 50">

