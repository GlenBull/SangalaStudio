<svg xmlns="http://www.w3.org/2000/svg" width="215.9mm" height="279.4mm" viewBox="0 0 215.9 279.4">
  <!-- PRINT only (filled, not red): a light box + label, ignored by the cutter -->
  <rect x="58" y="90" width="100" height="70" fill="#cfe8ff" stroke="none"/>
  <text x="70" y="126" font-family="sans-serif" font-size="7" fill="#333">CALIBRATION CARD</text>
  <text x="112" y="140" font-family="sans-serif" font-size="6" fill="#333">&lt;- fold line</text>
  <!-- CUT: red solid, no fill -> the card outline -->
  <rect x="58" y="90" width="100" height="70" fill="none" stroke="#ff0000" stroke-width="0.3"/>
  <!-- SCORE: red dashed -> a single fold down the middle -->
  <line x1="108" y1="90" x2="108" y2="160" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
</svg>
