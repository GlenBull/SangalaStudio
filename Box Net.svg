<svg xmlns="http://www.w3.org/2000/svg" width="215.9mm" height="279.4mm" viewBox="0 0 215.9 279.4">
  <!-- A 40 mm cube net: six faces in a cross, 5 panel folds, 7 glue tabs (8 mm deep, 45-degree ends).
       Every open joint has exactly ONE tab; the tab hinges are folds, so the tabs stay attached.
       Conventions: red solid = CUT, red dashed = FOLD, anything else = print-only. -->

  <!-- PRINT only: label -->
  <text x="60" y="232" font-family="sans-serif" font-size="6" fill="#333">BOX NET - folds make a 40 mm cube; glue the seven tabs inside</text>

  <!-- CUT: one continuous outline - the six faces' perimeter with the seven tabs in it -->
  <polygon fill="none" stroke="#ff0000" stroke-width="0.3" points="
    88,48 96,40 120,40 128,48
    136,56 136,80 128,88
    168,88 176,96 176,120 168,128
    160,136 136,136 128,128
    128,168 128,208 88,208 88,168 88,128
    80,136 56,136 48,128
    40,120 40,96 48,88
    88,88 80,80 80,56"/>

  <!-- FOLD: the five panel-to-panel creases -->
  <line x1="88"  y1="88"  x2="128" y2="88"  stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="88"  y1="88"  x2="88"  y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="128" y1="88"  x2="128" y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="88"  y1="128" x2="128" y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="88"  y1="168" x2="128" y2="168" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>

  <!-- FOLD: the seven tab hinges -->
  <line x1="88"  y1="48"  x2="128" y2="48"  stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="88"  y1="48"  x2="88"  y2="88"  stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="128" y1="48"  x2="128" y2="88"  stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="48"  y1="88"  x2="48"  y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="168" y1="88"  x2="168" y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="48"  y1="128" x2="88"  y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="128" y1="128" x2="168" y2="128" stroke="#ff0000" stroke-width="0.3" stroke-dasharray="2,2"/>
</svg>
